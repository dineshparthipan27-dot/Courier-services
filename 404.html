<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Package Not Found | SpeedX</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body class="error-page">
    <style>
        /* ==========================================
   GOOGLE FONT
========================================== */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body.error-page {
            font-family: 'Inter', sans-serif;
            background: #030712;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            color: #fff;
        }

        /* ==========================================
   Animated Background
========================================== */

        .error-page::before {
            content: "";
            position: absolute;
            inset: 0;

            background:
                radial-gradient(circle at 20% 20%, rgba(255, 87, 34, .18), transparent 30%),
                radial-gradient(circle at 80% 30%, rgba(255, 87, 34, .10), transparent 25%),
                radial-gradient(circle at 50% 80%, rgba(255, 255, 255, .04), transparent 35%);

            animation: bgMove 15s linear infinite alternate;
        }

        @keyframes bgMove {

            from {
                transform: scale(1) rotate(0deg);
            }

            to {
                transform: scale(1.15) rotate(4deg);
            }

        }

        /* ==========================================
 Floating Circles
========================================== */

        .circle {

            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, .05);
            animation: floatCircle linear infinite;
            z-index: 0;

        }

        .circle:nth-child(1) {

            width: 120px;
            height: 120px;
            left: 10%;
            top: 10%;
            animation-duration: 18s;

        }

        .circle:nth-child(2) {

            width: 60px;
            height: 60px;
            right: 12%;
            top: 18%;
            animation-duration: 12s;

        }

        .circle:nth-child(3) {

            width: 180px;
            height: 180px;
            left: 15%;
            bottom: -40px;
            animation-duration: 20s;

        }

        .circle:nth-child(4) {

            width: 80px;
            height: 80px;
            right: 18%;
            bottom: 10%;
            animation-duration: 15s;

        }

        @keyframes floatCircle {

            from {
                transform: translateY(0px);
            }

            to {
                transform: translateY(-40px);
            }

        }

        /* ==========================================
 Container
========================================== */

        .error-container {

            position: relative;
            z-index: 5;
            width: 90%;
            max-width: 850px;
            text-align: center;

            animation: fadeUp 1s ease;

        }

        @keyframes fadeUp {

            from {
                opacity: 0;
                transform: translateY(50px);
            }

            to {

                opacity: 1;
                transform: translateY(0);

            }

        }

        /* ==========================================
 Truck Animation
========================================== */

        .truck {

            font-size: 70px;
            color: #FF5722;

            margin-bottom: 30px;

            display: inline-block;

            animation: truckMove 3s ease-in-out infinite;

        }

        @keyframes truckMove {

            0% {

                transform: translateX(-10px);

            }

            50% {

                transform: translateX(10px);

            }

            100% {

                transform: translateX(-10px);

            }

        }

        /* ==========================================
 404
========================================== */

        .error-code {

            font-size: 180px;
            font-weight: 900;
            color: #FF5722;

            text-shadow:
                0 0 15px rgba(255, 87, 34, .5),
                0 0 40px rgba(255, 87, 34, .35),
                0 0 70px rgba(255, 87, 34, .25);

            animation: pulseGlow 2s infinite;

        }

        @keyframes pulseGlow {

            0%,
            100% {

                transform: scale(1);

            }

            50% {

                transform: scale(1.05);

            }

        }

        .error-container h1 {

            font-size: 48px;
            margin: 20px 0;

        }

        .error-container p {

            font-size: 18px;
            color: #94A3B8;
            max-width: 600px;
            margin: auto;
            line-height: 1.8;

        }

        /* ==========================================
 Buttons
========================================== */

        .error-actions {

            margin-top: 45px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;

        }

        .btn-primary-glow,
        .btn-outline-light {

            padding: 16px 34px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: .35s;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;

        }

        .btn-primary-glow {

            background: #FF5722;
            color: #fff;
            border: none;
            box-shadow: 0 10px 30px rgba(255, 87, 34, .35);

        }

        .btn-primary-glow:hover {

            transform: translateY(-5px);
            box-shadow: 0 18px 40px rgba(255, 87, 34, .45);

        }

        .btn-outline-light {

            color: #fff;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, .2);

        }

        .btn-outline-light:hover {

            background: #fff;
            color: #111827;
            transform: translateY(-5px);

        }

        /* ==========================================
 Floating Packages
========================================== */

        .package {

            position: absolute;
            color: rgba(255, 87, 34, .35);
            font-size: 35px;
            animation: packageFloat 7s linear infinite;

        }

        .package1 {

            top: 18%;
            left: 8%;

        }

        .package2 {

            right: 10%;
            top: 30%;
            animation-delay: 2s;

        }

        .package3 {

            bottom: 18%;
            left: 15%;
            animation-delay: 4s;

        }

        .package4 {

            bottom: 15%;
            right: 12%;
            animation-delay: 6s;

        }

        @keyframes packageFloat {

            0% {

                transform: translateY(0px) rotate(0);

            }

            50% {

                transform: translateY(-25px) rotate(15deg);

            }

            100% {

                transform: translateY(0px) rotate(0);

            }

        }

        /* ==========================================
 Responsive
========================================== */

        @media(max-width:768px) {

            .truck {

                font-size: 55px;

            }

            .error-code {

                font-size: 110px;

            }

            .error-container h1 {

                font-size: 34px;

            }

            .error-container p {

                font-size: 16px;

            }

            .error-actions {

                flex-direction: column;

            }

            .btn-primary-glow,
            .btn-outline-light {

                justify-content: center;
                width: 100%;

            }

        }
    </style>

    <div class="error-container">
        <div class="error-code">404</div>
        <h1>Package Not Found!</h1>
        <p>Looks like the route you're trying to take doesn't exist in our global network.</p>

        <div class="error-actions">
            <!-- Back to Home -->
            <a href="index.html" class="btn-primary-glow">
                <i class="fa-solid fa-house"></i> Back to Home
            </a>
            <!-- Go Back Function -->
            <button onclick="history.back()" class="btn-outline-light">
                <i class="fa-solid fa-arrow-left"></i> Go Back
            </button>
        </div>
    </div>

</body>

</html>
